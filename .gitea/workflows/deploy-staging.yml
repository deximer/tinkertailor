name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: [self-hosted, linux, amd64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: [self-hosted, linux, amd64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  deploy:
    name: Deploy to Staging
    needs: [typecheck, lint]
    runs-on: [self-hosted, linux, amd64]
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --app tinker-tailor-staging --config infra/fly.staging.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

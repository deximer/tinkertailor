name: Deploy QA

on:
  push:
    branches: [qa]

jobs:
  typecheck:
    name: Typecheck
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run lint

  deploy:
    name: Deploy to QA
    needs: [typecheck, lint]
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5
      - run: npm ci
      - run: cp ~/wrk/syntelyos/clients/tinkertailor/.env.qa .env.qa
      - run: bash infra/deploy.sh qa
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
